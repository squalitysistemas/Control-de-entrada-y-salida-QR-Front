<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #059669;
            --primary-dark: #047857;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 1);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .face-mask-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            z-index: 10;
            mask-image: radial-gradient(ellipse 45% 60% at 50% 45%, transparent 99%, black 100%);
            -webkit-mask-image: radial-gradient(ellipse 45% 60% at 50% 45%, transparent 99%, black 100%);
        }

        .face-guide {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 50% / 50%;
            z-index: 11;
            transition: all 0.3s ease;
        }

        .face-guide.active {
            border-color: #10b981;
            border-style: solid;
            box-shadow: 0 0 0 1000px rgba(16, 185, 129, 0.15);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* Animaciones y Efectos */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .shutter-flash {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }
        .shutter-active { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        #qr-reader { border: none !important; }
        #qr-reader__scan_region { background: #0f172a !important; }
        #qr-reader__dashboard_section_csr button {
            background-color: #10b981 !important;
            color: white !important;
            border-radius: 12px !important;
            padding: 10px 20px !important;
            font-weight: 600 !important;
        }

        .loader-ring {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-bottom-color: #10b981;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full glass-panel rounded-[2.5rem] shadow-2xl overflow-hidden relative min-h-[700px] flex flex-col">
        <div id="shutter" class="shutter-flash"></div>

        <header class="bg-emerald-600 p-6 text-white text-center shrink-0 shadow-lg">
            <div class="flex justify-center mb-2">
                <div class="p-2 bg-white/20 rounded-xl">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
            </div>
            <h1 class="text-lg font-bold tracking-tight uppercase">Control de Asistencia</h1>
            <p id="system-status-text" class="text-emerald-100 text-[10px] font-medium uppercase tracking-widest opacity-80">Sistemas Biométricos Activos</p>
        </header>

        <main id="app-content" class="flex-1 flex flex-col p-6 overflow-y-auto">
            
            <!-- PANTALLA 1: SELECCIÓN -->
            <section id="view-selection" class="fade-in space-y-6 my-auto text-center">
                <div class="space-y-2">
                    <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Bienvenido</h2>
                    <p class="text-slate-500 text-sm">Seleccione el método de autenticación</p>
                </div>

                <div class="grid gap-4">
                    <button onclick="showView('face')" class="group flex items-center p-5 bg-white border-2 border-slate-100 rounded-3xl hover:border-emerald-500 hover:bg-emerald-50 transition-all shadow-sm">
                        <div class="p-4 bg-emerald-100 text-emerald-600 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                            <i data-lucide="scan-face" class="w-7 h-7"></i>
                        </div>
                        <div class="ml-4 text-left">
                            <span class="block font-bold text-slate-800">Biometría Facial</span>
                            <span class="text-xs text-slate-400">Detección de puntos faciales</span>
                        </div>
                    </button>

                    <button onclick="showView('qr')" class="group flex items-center p-5 bg-white border-2 border-slate-100 rounded-3xl hover:border-emerald-500 hover:bg-emerald-50 transition-all shadow-sm">
                        <div class="p-4 bg-slate-100 text-slate-600 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                            <i data-lucide="qr-code" class="w-7 h-7"></i>
                        </div>
                        <div class="ml-4 text-left">
                            <span class="block font-bold text-slate-800">Escaneo QR</span>
                            <span class="text-xs text-slate-400">Verificación de credencial</span>
                        </div>
                    </button>
                </div>
            </section>

            <section id="view-face" class="hidden fade-in flex-1 flex flex-col">
                <div class="relative w-full aspect-[4/5] bg-slate-900 rounded-[2rem] overflow-hidden shadow-2xl mb-6 flex flex-col items-center justify-center">
                    <video id="video-feed" class="absolute inset-0 w-full h-full object-cover scale-x-[-1]" autoplay playsinline></video>
                    <div id="face-ui-overlay" class="face-mask-overlay hidden"></div>
                    <div id="face-guide" class="face-guide hidden"></div>
                    <button id="face-start-btn" onclick="initFaceCamera()" class="relative z-20 px-8 py-3 bg-emerald-600 text-white font-bold rounded-2xl shadow-xl">Iniciar Reconocimiento</button>
                    
                    <div id="face-status-bubble" class="hidden absolute bottom-6 bg-black/70 backdrop-blur-md text-white px-5 py-2 rounded-full text-[10px] font-bold z-20 flex items-center gap-2">
                        <span id="face-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                        <span id="face-text">BUSCANDO ROSTRO</span>
                    </div>
                </div>
                <div id="capture-progress-container" class="space-y-2 opacity-0">
                    <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">
                        <div id="progress-fill" class="h-full bg-emerald-500 w-0 transition-all duration-100"></div>
                    </div>
                </div>
                <button onclick="goHome()" class="mt-auto py-3 text-slate-400 font-bold text-sm uppercase">Cancelar</button>
            </section>

            <section id="view-qr" class="hidden fade-in flex-1 flex flex-col">
                <div class="relative w-full aspect-square bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl mb-6 border-4 border-white">
                    <div id="qr-reader" class="w-full h-full"></div>
                </div>
                <button onclick="goHome()" class="mt-auto py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">Volver</button>
            </section>

            <section id="view-loading" class="hidden fade-in flex-1 flex flex-col items-center justify-center text-center">
                <div class="loader-ring mb-6"></div>
                <h3 id="loading-title" class="text-xl font-bold text-slate-800 mb-2">Procesando...</h3>
                <p id="loading-subtitle" class="text-sm text-slate-500 max-w-[250px]"></p>
            </section>

            <section id="view-preview" class="hidden fade-in flex-1 flex flex-col items-center">
                <div class="relative w-full aspect-[4/5] bg-white rounded-[2.5rem] overflow-hidden shadow-2xl mb-8 max-w-[260px] border-4 border-white">
                    <img id="captured-photo" class="w-full h-full object-cover scale-x-[-1]" src="">
                </div>
                <button onclick="finalizeRegistration('Reconocimiento Facial')" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-xl">Confirmar Registro Facial</button>
                <button onclick="showView('face')" class="w-full py-3 text-slate-400 font-bold text-sm mt-2">Repetir</button>
            </section>

        </main>

        <footer class="p-4 bg-slate-50 border-t border-slate-100 text-center">
            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">SECURE ACCESS CONTROL • V3.0</p>
        </footer>
    </div>

    
    <!-- Modal Confirmar Nombre QR -->
    <div id="modal-confirm-name" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center fade-in shadow-2xl">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600">
                <i data-lucide="user" class="w-10 h-10"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-500 mb-1">Verificación</h2>
            <p class="text-2xl font-extrabold text-slate-800 mb-8" id="display-name">¿Eres Pepito Perez?</p>
            <div class="grid gap-3">
                <button id="btn-confirm-attendance" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl shadow-lg">Confirmar</button>
                <button id="btn-cancel-attendance" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">No soy yo</button>
            </div>
        </div>
    </div>

    <!-- Modal Resultado Final -->
    <div id="modal-result" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-[110]">
        <div class="bg-white rounded-[3rem] p-10 max-w-xs w-full text-center fade-in shadow-2xl">
            <div id="result-icon-container" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i id="result-icon" data-lucide="check" class="w-8 h-8"></i>
            </div>
            <h2 id="result-title" class="text-xl font-bold mb-2"></h2>
            <p id="result-desc" class="text-sm text-slate-500 mb-6"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-800 text-white font-bold rounded-2xl">Finalizar</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const API_BASE = "https://control-es-qr-281979635747.northamerica-south1.run.app";
        const ENDPOINTS = {
            verify: `${API_BASE}/api/v1/verificar/nombre/qr`,
            attendance: `${API_BASE}/api/v1/asistencia`
        };

        let stream = null;
        let qrScanner = null;
        let currentSerial = null;
        let faceDetectionInterval = null;
        let captureProgress = 0;
        let modelsLoaded = false;

        async function loadModels() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                modelsLoaded = true;
                document.getElementById('system-status-text').textContent = "Modelos IA Cargados";
            } catch (e) { console.error("Error IA:", e); }
        }
        loadModels();

        function showView(viewId) {
            stopAllSystems();
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            if (viewId === 'qr') initQR();
            lucide.createIcons();
        }

        function goHome() { showView('selection'); }

        function stopAllSystems() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            if (qrScanner) { qrScanner.stop().catch(()=>{}); qrScanner = null; }
            if (faceDetectionInterval) { clearInterval(faceDetectionInterval); faceDetectionInterval = null; }
            captureProgress = 0;
        }

        async function initFaceCamera() {
            const video = document.getElementById('video-feed');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                document.getElementById('face-start-btn').classList.add('hidden');
                document.getElementById('face-ui-overlay').classList.remove('hidden');
                document.getElementById('face-guide').classList.remove('hidden');
                document.getElementById('face-status-bubble').classList.remove('hidden');
                document.getElementById('capture-progress-container').classList.remove('opacity-0');
                
                faceDetectionInterval = setInterval(async () => {
                    let detected = modelsLoaded ? !!(await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())) : true;
                    updateFaceUI(detected);
                    if (detected) {
                        captureProgress += 2;
                        if (captureProgress >= 100) {
                            clearInterval(faceDetectionInterval);
                            takePhoto();
                        }
                    }
                }, 100);
            } catch (e) { showFinalResult(false, "Error de Cámara", "No se pudo acceder al hardware de video."); }
        }

        function updateFaceUI(detected) {
            const guide = document.getElementById('face-guide');
            const indicator = document.getElementById('face-indicator');
            const text = document.getElementById('face-text');
            const fill = document.getElementById('progress-fill');

            if (detected) {
                guide.classList.add('active');
                indicator.className = "w-2 h-2 rounded-full bg-emerald-500";
                text.textContent = "ROSTRO IDENTIFICADO";
            } else {
                guide.classList.remove('active');
                indicator.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                text.textContent = "BUSCANDO ROSTRO";
                captureProgress = Math.max(0, captureProgress - 1);
            }
            fill.style.width = `${captureProgress}%`;
        }

        function takePhoto() {
            const video = document.getElementById('video-feed');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            document.getElementById('captured-photo').src = canvas.toDataURL('image/jpeg');
            document.getElementById('shutter').classList.add('shutter-active');
            setTimeout(() => {
                showView('preview');
                document.getElementById('shutter').classList.remove('shutter-active');
            }, 400);
        }

        function initQR() {
            qrScanner = new Html5Qrcode("qr-reader");
            const config = { fps: 20, qrbox: { width: 300, height: 300 } };
            qrScanner.start({ facingMode: "environment" }, config, async (text) => {
                currentSerial = text;
                await qrScanner.stop();
                verifyEmployee(text);
            });
        }

        async function verifyEmployee(serial) {
            setLoading(true, "Verificando...", "Consultando identidad en el servidor");
            try {
                const res = await fetch(ENDPOINTS.verify, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serial_qr: serial })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok && data.nombre) {
                    showNameConfirmation(data.nombre);
                } else {
                    showFinalResult(false, "Error de Identidad", "El QR escaneado no pertenece a ningún empleado registrado.");
                }
            } catch (e) {
                setLoading(false);
                showFinalResult(false, "Falla de Red", "No se pudo contactar al servicio de verificación.");
            }
        }

        function showNameConfirmation(nombre) {
            const modal = document.getElementById('modal-confirm-name');
            document.getElementById('display-name').textContent = `¿Eres ${nombre}?`;
            modal.classList.replace('hidden', 'flex');

            document.getElementById('btn-confirm-attendance').onclick = () => {
                modal.classList.replace('flex', 'hidden');
                processAttendance(nombre);
            };

            document.getElementById('btn-cancel-attendance').onclick = () => {
                modal.classList.replace('flex', 'hidden');
                showFinalResult(false, "Acceso Denegado", "Por favor escanea un código QR que te pertenezca únicamente a ti.");
            };
        }

        async function processAttendance(nombre) {
            setLoading(true, "Registrando...", `Realizando registro de asistencia para ${nombre}`);
            try {
                const res = await fetch(ENDPOINTS.attendance, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serial_qr: currentSerial })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok) {
                    showFinalResult(true, "¡Éxito!", data.message || `Registro completado para ${nombre}`);
                } else {
                    showFinalResult(false, "Fallo en Registro", data.message || "No se pudo procesar la asistencia.");
                }
            } catch (e) {
                setLoading(false);
                showFinalResult(false, "Error Crítico", "Falla en la comunicación final.");
            }
        }

        function setLoading(show, title = "", subtitle = "") {
            if (show) {
                document.getElementById('loading-title').textContent = title;
                document.getElementById('loading-subtitle').textContent = subtitle;
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById('view-loading').classList.remove('hidden');
            }
        }

        function finalizeRegistration(metodo) {
            showFinalResult(true, "¡Registrado!", `Su registro mediante ${metodo} ha sido guardado exitosamente.`);
        }

        function showFinalResult(success, title, desc) {
            const modal = document.getElementById('modal-result');
            const container = document.getElementById('result-icon-container');
            const icon = document.getElementById('result-icon');
            
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-desc').textContent = desc;

            if (success) {
                container.className = "w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4";
                icon.setAttribute('data-lucide', 'check');
                document.getElementById('result-title').className = "text-xl font-bold text-emerald-600 mb-2";
            } else {
                container.className = "w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4";
                icon.setAttribute('data-lucide', 'x-circle');
                document.getElementById('result-title').className = "text-xl font-bold text-red-600 mb-2";
            }
            modal.classList.replace('hidden', 'flex');
            lucide.createIcons();
        }
    </script>
</body>
</html>
